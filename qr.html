<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DeskCare — Expo Go QR</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f2f6f8; }
    .card { background: white; border-radius: 24px; padding: 40px; text-align: center; box-shadow: 0 4px 32px rgba(0,103,125,0.10); }
    h1 { color: #00677d; font-size: 24px; margin: 0 0 8px; }
    p { color: #3d494d; margin: 0 0 24px; font-size: 15px; }
    img { border-radius: 12px; }
    code { display: block; margin-top: 20px; background: #eceef0; border-radius: 8px; padding: 10px 20px; font-size: 14px; color: #00677d; }
  </style>
</head>
<body>
  <div class="card">
    <h1>DeskCare</h1>
    <p>Сканируй в Expo Go</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=exp%3A%2F%2F192.168.0.122%3A8081" width="280" height="280" alt="QR code">
    <code>exp://192.168.0.122:8081</code>
  </div>
</body>
</html>
