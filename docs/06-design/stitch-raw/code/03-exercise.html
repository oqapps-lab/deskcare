<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DeskCare - Exercise Player</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#b9c8de",
                        "secondary-container": "#d2e1f7",
                        "outline-variant": "#bcc9ce",
                        "on-secondary-fixed-variant": "#39485a",
                        "secondary": "#516072",
                        "on-secondary": "#ffffff",
                        "primary": "#00677d",
                        "surface-variant": "#e0e3e5",
                        "on-tertiary-container": "#2a3e41",
                        "on-tertiary-fixed-variant": "#364a4d",
                        "surface-container-highest": "#e0e3e5",
                        "inverse-on-surface": "#eff1f3",
                        "outline": "#6d797e",
                        "on-tertiary-fixed": "#091f21",
                        "on-surface": "#191c1e",
                        "on-primary-fixed-variant": "#004e5f",
                        "on-primary-fixed": "#001f27",
                        "primary-fixed-dim": "#4cd6fb",
                        "on-primary-container": "#00414f",
                        "tertiary-fixed": "#d0e7ea",
                        "on-error": "#ffffff",
                        "tertiary": "#4d6265",
                        "tertiary-container": "#93a9ac",
                        "surface-tint": "#00677d",
                        "on-surface-variant": "#3d494d",
                        "surface-container": "#eceef0",
                        "surface": "#f7f9fb",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#d4e4fa",
                        "surface-container-high": "#e6e8ea",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "background": "#f7f9fb",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#b4cbce",
                        "on-secondary-container": "#556477",
                        "surface-dim": "#d8dadc",
                        "surface-bright": "#f7f9fb",
                        "surface-container-low": "#f2f4f6",
                        "on-background": "#191c1e",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#b3ebff",
                        "inverse-primary": "#4cd6fb",
                        "primary-container": "#00b4d8",
                        "on-secondary-fixed": "#0d1c2d",
                        "inverse-surface": "#2d3133"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "display": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="h-full bg-background font-body text-on-surface antialiased overflow-hidden">
<!-- Main Canvas: The Player -->
<main class="relative h-full w-full flex flex-col justify-between">
<!-- Video Background Layer -->
<div class="absolute inset-0 z-0">
<img alt="Person performing a neck stretch in a bright, minimalist white studio with soft high-key lighting" class="w-full h-full object-cover object-center opacity-90 mix-blend-multiply" data-alt="Person performing a gentle neck stretch in a bright, minimalist white studio with soft high-key lighting, wearing light activewear" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAWAkpxex5CFJJ9bwoy0K572aEon5CJVBfMDy2PYphBE0Kd1w2SWFLrMhbJfkTJc4e23Wtnz0IsjrWKTCLniGyerZwzapFM026Ck2yKKRhgj6YcQpE1Gbx4T2Yz73L31Gk_Au2nHLqdp1rSwILnRCiz1_iPyc0S5pTwqv58lPsoSutedqrlbNzCHD6TvO2p5gl2Z7rUpgfa9Jjj6MW4hnpTPrrwOeAg9Gv_0R4xaqykPNnDRHlsNJra_-dBWj_jGGi9vxqnWqgbDwc"/>
<!-- Ambient gradient overlay to ensure text legibility while maintaining the high-key porcelain feel -->
<div class="absolute inset-0 bg-gradient-to-b from-surface-container-lowest/80 via-transparent to-surface-container-lowest"></div>
</div>
<!-- Top Controls (Dismiss) -->
<header class="relative z-10 w-full px-6 pt-12 pb-4 flex justify-between items-center">
<button class="w-12 h-12 rounded-full bg-surface-container-lowest/80 backdrop-blur-2xl flex items-center justify-center shadow-[0_20px_50px_rgba(0,103,125,0.05)] hover:bg-surface-container-lowest transition-all">
<span class="material-symbols-outlined text-on-surface text-xl">close</span>
</button>
<div class="bg-surface-container-lowest/80 backdrop-blur-2xl px-4 py-2 rounded-full shadow-[0_20px_50px_rgba(0,103,125,0.05)]">
<span class="font-headline font-bold text-sm tracking-widest text-primary uppercase">Set 1 of 3</span>
</div>
<button class="w-12 h-12 rounded-full bg-surface-container-lowest/80 backdrop-blur-2xl flex items-center justify-center shadow-[0_20px_50px_rgba(0,103,125,0.05)] hover:bg-surface-container-lowest transition-all">
<span class="material-symbols-outlined text-on-surface text-xl">more_horiz</span>
</button>
</header>
<!-- Center: Progress Ring & Timer -->
<div class="relative z-10 flex-1 flex flex-col items-center justify-center px-6">
<!-- Coaching Cue -->
<div class="mb-12 text-center animate-pulse">
<h2 class="font-headline font-extrabold text-3xl tracking-tight text-on-surface">Keep your chin tucked</h2>
<p class="font-body text-on-surface-variant text-sm mt-2">Neck Flexion Hold</p>
</div>
<!-- Progress Ring Container -->
<div class="relative w-64 h-64 flex items-center justify-center">
<!-- SVG Ring -->
<svg class="absolute inset-0 w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<!-- Background Ring -->
<circle class="text-surface-container-high opacity-50" cx="50" cy="50" fill="none" r="46" stroke="currentColor" stroke-width="2"></circle>
<!-- Progress Ring -->
<circle class="transition-all duration-1000 ease-linear" cx="50" cy="50" fill="none" r="46" stroke="url(#progressGradient)" stroke-dasharray="289" stroke-dashoffset="110" stroke-linecap="round" stroke-width="4"></circle>
<!-- Gradient Definition -->
<defs>
<lineargradient id="progressGradient" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" stop-color="#00677d"></stop>
<stop offset="100%" stop-color="#00b4d8"></stop>
</lineargradient>
</defs>
</svg>
<!-- Holographic Timer -->
<div class="text-center flex flex-col items-center">
<span class="font-headline font-extrabold text-6xl text-primary drop-shadow-[0_0_15px_rgba(76,214,251,0.4)]">0:45</span>
</div>
</div>
</div>
<!-- Bottom Transport Controls -->
<div class="relative z-10 w-full px-8 pb-16 pt-8 bg-surface-container-lowest/90 backdrop-blur-3xl rounded-t-[3rem] shadow-[0_-20px_50px_rgba(0,103,125,0.05)]">
<div class="flex justify-center items-center gap-8">
<!-- Previous -->
<button class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-2xl">skip_previous</span>
</button>
<!-- Play/Pause (Primary Action) -->
<button class="w-24 h-24 rounded-[2rem] bg-gradient-to-br from-primary to-primary-container flex items-center justify-center text-on-primary shadow-[0_15px_30px_rgba(0,103,125,0.2)] hover:opacity-90 transition-opacity relative overflow-hidden">
<div class="absolute top-0 inset-x-0 h-px bg-primary-fixed opacity-50"></div>
<span class="material-symbols-outlined text-4xl fill">pause</span>
</button>
<!-- Next -->
<button class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-2xl">skip_next</span>
</button>
</div>
</div>
</main>
</body></html>
