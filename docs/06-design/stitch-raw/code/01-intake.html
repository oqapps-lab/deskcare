<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Step 1</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-highest": "#e1e3e3",
                    "on-secondary-container": "#376d6d",
                    "on-tertiary-container": "#5c4284",
                    "error-container": "#ffdad6",
                    "on-tertiary-fixed": "#26094c",
                    "surface-tint": "#006a6a",
                    "on-secondary": "#ffffff",
                    "secondary-fixed": "#b5edec",
                    "surface-container-high": "#e6e8e9",
                    "inverse-primary": "#1adcdc",
                    "surface-variant": "#e1e3e3",
                    "on-primary": "#ffffff",
                    "secondary-container": "#b5edec",
                    "inverse-on-surface": "#eff1f1",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed": "#50f9f9",
                    "outline-variant": "#bacac9",
                    "on-surface": "#191c1d",
                    "on-error": "#ffffff",
                    "inverse-surface": "#2e3131",
                    "on-primary-fixed-variant": "#004f4f",
                    "background": "#f8fafa",
                    "secondary": "#316766",
                    "primary": "#006a6a",
                    "primary-container": "#00d7d7",
                    "surface-dim": "#d8dada",
                    "surface-container-low": "#f2f4f4",
                    "surface": "#f8fafa",
                    "tertiary-fixed": "#ecdcff",
                    "on-primary-container": "#005959",
                    "on-background": "#191c1d",
                    "secondary-fixed-dim": "#9ad0d0",
                    "on-primary-fixed": "#002020",
                    "primary-fixed-dim": "#1adcdc",
                    "on-surface-variant": "#3b4949",
                    "tertiary-container": "#d2b4ff",
                    "on-secondary-fixed-variant": "#144f4e",
                    "surface-container": "#eceeee",
                    "on-error-container": "#93000a",
                    "on-tertiary-fixed-variant": "#53397b",
                    "surface-bright": "#f8fafa",
                    "outline": "#6b7a79",
                    "on-secondary-fixed": "#002020",
                    "on-tertiary": "#ffffff",
                    "error": "#ba1a1a",
                    "tertiary-fixed-dim": "#d6baff",
                    "tertiary": "#6c5194"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk", "sans-serif"],
                    "display": ["Space Grotesk", "sans-serif"],
                    "body": ["Manrope", "sans-serif"],
                    "label": ["Manrope", "sans-serif"]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#f7f9fb] text-on-surface font-body antialiased min-h-screen flex flex-col items-center justify-center p-6 sm:p-8 md:p-12">
<!-- Main Container -->
<main class="w-full max-w-2xl mx-auto flex flex-col gap-10">
<!-- Step Progress Pebbles -->
<div aria-label="Progress" class="flex items-center justify-center gap-3">
<div class="w-3 h-3 rounded-full bg-gradient-to-br from-primary to-primary-container shadow-[0_0_15px_rgba(0,215,215,0.4)] ring-4 ring-primary-container/20"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Question Crystal -->
<section class="bg-surface-container-lowest rounded-xl p-10 md:p-14 text-center shadow-[0_20px_60px_-15px_rgba(25,28,29,0.05)] flex flex-col gap-8 relative overflow-hidden">
<!-- Subtle background light leak -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[150%] h-[150%] bg-gradient-to-b from-primary-container/10 to-transparent opacity-50 pointer-events-none" style="filter: blur(40px);"></div>
<h1 class="font-headline font-semibold text-3xl md:text-4xl leading-tight text-on-surface z-10">
                Which area needs attention most?
            </h1>
<!-- 2x2 Answer Capsule Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4 z-10">
<!-- Option 1: Selected -->
<button aria-pressed="true" class="group relative bg-surface-container-lowest rounded-xl p-6 text-left transition-all duration-300 hover:bg-surface-container-lowest focus:outline-none ring-1 ring-outline-variant/15 ring-inset ring-offset-0 ring-offset-transparent shadow-[0_10px_30px_-10px_rgba(0,215,215,0.15)] overflow-hidden">
<!-- Selected Glow -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-primary-container/10 pointer-events-none"></div>
<div class="absolute inset-0 ring-2 ring-primary-container/50 rounded-xl pointer-events-none"></div>
<div class="flex items-center gap-4 relative z-10">
<div class="flex-shrink-0 w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-primary group-hover:bg-primary-container/20 transition-colors">
<span class="material-symbols-outlined text-[28px]" data-icon="accessibility_new">accessibility_new</span>
</div>
<div>
<h3 class="font-headline font-medium text-lg text-on-surface">Neck &amp; Shoulders</h3>
<p class="font-body text-sm text-on-surface-variant mt-1">Tension &amp; stiffness</p>
</div>
</div>
</button>
<!-- Option 2: Unselected -->
<button aria-pressed="false" class="group relative bg-surface-container-low rounded-xl p-6 text-left transition-all duration-300 hover:bg-surface-container-lowest hover:shadow-[0_10px_30px_-10px_rgba(25,28,29,0.05)] focus:outline-none">
<div class="flex items-center gap-4 relative z-10">
<div class="flex-shrink-0 w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[28px]" data-icon="airline_seat_recline_normal">airline_seat_recline_normal</span>
</div>
<div>
<h3 class="font-headline font-medium text-lg text-on-surface">Lower Back</h3>
<p class="font-body text-sm text-on-surface-variant mt-1">Posture &amp; pain</p>
</div>
</div>
</button>
<!-- Option 3: Unselected -->
<button aria-pressed="false" class="group relative bg-surface-container-low rounded-xl p-6 text-left transition-all duration-300 hover:bg-surface-container-lowest hover:shadow-[0_10px_30px_-10px_rgba(25,28,29,0.05)] focus:outline-none">
<div class="flex items-center gap-4 relative z-10">
<div class="flex-shrink-0 w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[28px]" data-icon="visibility">visibility</span>
</div>
<div>
<h3 class="font-headline font-medium text-lg text-on-surface">Eyes &amp; Head</h3>
<p class="font-body text-sm text-on-surface-variant mt-1">Fatigue &amp; focus</p>
</div>
</div>
</button>
<!-- Option 4: Unselected -->
<button aria-pressed="false" class="group relative bg-surface-container-low rounded-xl p-6 text-left transition-all duration-300 hover:bg-surface-container-lowest hover:shadow-[0_10px_30px_-10px_rgba(25,28,29,0.05)] focus:outline-none">
<div class="flex items-center gap-4 relative z-10">
<div class="flex-shrink-0 w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[28px]" data-icon="back_hand">back_hand</span>
</div>
<div>
<h3 class="font-headline font-medium text-lg text-on-surface">Wrists &amp; Hands</h3>
<p class="font-body text-sm text-on-surface-variant mt-1">Strain &amp; dexterity</p>
</div>
</div>
</button>
</div>
</section>
<!-- Continue Capsule -->
<div class="flex justify-center mt-4">
<button class="relative group overflow-hidden bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-medium text-lg px-10 py-5 rounded-full shadow-[0_10px_30px_-10px_rgba(0,215,215,0.6)] hover:shadow-[0_15px_40px_-10px_rgba(0,215,215,0.8)] transition-all duration-300 transform hover:-translate-y-1 active:translate-y-0 focus:outline-none ring-2 ring-transparent focus:ring-primary-container/50">
<!-- Inner Glow for glass edge effect -->
<div class="absolute top-0 left-0 right-0 h-[1px] bg-white/20 blur-[1px]"></div>
<span class="relative z-10 flex items-center gap-2">
                    This is my focus
                    <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</span>
<!-- Hover Refractive Light Leak -->
<div class="absolute inset-0 bg-white/0 group-hover:bg-white/10 transition-colors duration-300"></div>
</button>
</div>
</main>
</body></html>
