<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DeskCare Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#005959",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6",
                        "surface": "#f8fafa",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ecdcff",
                        "on-secondary-container": "#376d6d",
                        "background": "#f8fafa",
                        "surface-dim": "#d8dada",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#5c4284",
                        "on-secondary-fixed-variant": "#144f4e",
                        "error": "#ba1a1a",
                        "tertiary-container": "#d2b4ff",
                        "surface-variant": "#e1e3e3",
                        "on-background": "#191c1d",
                        "secondary": "#316766",
                        "inverse-primary": "#1adcdc",
                        "inverse-on-surface": "#eff1f1",
                        "surface-container": "#eceeee",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed-variant": "#53397b",
                        "surface-container-low": "#f2f4f4",
                        "on-secondary-fixed": "#002020",
                        "inverse-surface": "#2e3131",
                        "surface-container-high": "#e6e8e9",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#26094c",
                        "on-surface-variant": "#3b4949",
                        "secondary-fixed-dim": "#9ad0d0",
                        "on-surface": "#191c1d",
                        "surface-tint": "#006a6a",
                        "on-primary-fixed-variant": "#004f4f",
                        "outline": "#6b7a79",
                        "outline-variant": "#bacac9",
                        "secondary-fixed": "#b5edec",
                        "tertiary": "#6c5194",
                        "primary": "#006a6a",
                        "primary-fixed-dim": "#1adcdc",
                        "on-primary-fixed": "#002020",
                        "primary-container": "#00d7d7",
                        "surface-container-highest": "#e1e3e3",
                        "primary-fixed": "#50f9f9",
                        "secondary-container": "#b5edec",
                        "tertiary-fixed-dim": "#d6baff",
                        "surface-bright": "#f8fafa"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
            font-family: theme('fontFamily.body');
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-surface relative overflow-hidden">
<!-- Ambient Light Effects -->
<div class="absolute top-[-20%] left-[-10%] w-[70vw] h-[70vw] rounded-full bg-primary-fixed opacity-10 blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-tertiary-fixed opacity-20 blur-[100px] pointer-events-none"></div>
<!-- Progress Indicator -->
<div class="absolute top-12 left-1/2 -translate-x-1/2 flex space-x-3 z-20">
<div class="w-8 h-2 rounded-full bg-gradient-to-r from-primary to-primary-container shadow-[0_0_12px_rgba(0,215,215,0.4)]"></div>
<div class="w-8 h-2 rounded-full bg-surface-container-high transition-colors"></div>
<div class="w-8 h-2 rounded-full bg-surface-container-high transition-colors"></div>
</div>
<!-- Main Content Container -->
<main class="w-full max-w-md flex-1 flex flex-col justify-center items-center relative z-10 my-24">
<!-- The Floating Card -->
<article class="w-full bg-surface-container-lowest rounded-xl p-8 flex flex-col items-center text-center relative overflow-hidden">
<!-- Subtle inner gradient for light-leak effect -->
<div class="absolute inset-0 bg-gradient-to-br from-primary-fixed/5 to-transparent pointer-events-none rounded-xl"></div>
<!-- Image/Graphic Area -->
<div class="w-full aspect-square mb-10 rounded-full bg-surface-container-low flex items-center justify-center relative overflow-hidden">
<!-- Conceptual Illustration: Clinical Silhouette -->
<img alt="Silhouette of person at desk" class="w-full h-full object-cover mix-blend-luminosity opacity-80" data-alt="Abstract minimal silhouette of a person sitting at a modern desk, illuminated by soft cyan glowing zones indicating physical tension, rendered in high-key lighting, bright white porcelain background, serene and clinical." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDEc7RokFcyIP7jMAdE1TCGg_xxhk6P8xMlkYSR8AfYZaRZp3a2KjleTOarjoBhteZ7iomyWYsZ0Nm-Mmi0R1NT4ec_a49dHsDsfP9jpBV6F0qoC_IMJjx9SNEhyqW_9SQmxo9Wc5BCRCeniJVOUfOPGw646JGJLCFXlDQ7aTG-oKW-HGsjKcD5TAv0Ztg3cKE3cZSJDD2mUhv5uKnH_kqlc-5hc83ub5-azqSTIRg49g1iNUOJUFVOJvzPvP7UxFuVRY5aKyOdOR8"/>
<!-- Holographic Overlays (Turquoise Tension Zones) -->
<div class="absolute top-[30%] right-[35%] w-16 h-16 rounded-full bg-primary-fixed-dim/60 blur-xl animate-pulse"></div>
<div class="absolute bottom-[40%] left-[40%] w-24 h-24 rounded-full bg-primary/40 blur-2xl"></div>
<!-- Refractive Ring -->
<div class="absolute inset-4 rounded-full border border-primary-fixed/20 pointer-events-none"></div>
</div>
<!-- Typography -->
<h1 class="font-headline text-3xl font-bold tracking-[0.02em] leading-tight text-on-surface mb-6 relative">
                Precision recovery for the high-performance body.
            </h1>
<p class="font-body text-on-surface-variant leading-relaxed mb-4">
                DeskCare analyzes your postural data to deliver targeted relief protocols. Step into the sanctuary.
            </p>
</article>
</main>
<!-- Action Area -->
<div class="fixed bottom-12 left-0 right-0 px-8 flex justify-center z-30">
<button class="w-full max-w-md bg-gradient-to-br from-primary to-primary-container text-white font-body font-semibold text-lg py-5 px-8 rounded-full shadow-[0_16px_32px_-8px_rgba(0,106,106,0.3)] hover:shadow-[0_20px_40px_-8px_rgba(0,215,215,0.4)] transition-all duration-300 relative overflow-hidden group flex items-center justify-center gap-3">
<!-- Inner white glow simulation -->
<div class="absolute top-0 left-0 right-0 h-[2px] bg-white/30 blur-[1px]"></div>
<span>Next</span>
<span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</div>
</body></html>
